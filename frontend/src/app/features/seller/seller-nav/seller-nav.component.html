<nav class="seller-nav">
  <div class="seller-nav-label">Overview</div>
  <a class="seller-nav-link" routerLink="/seller" [class.active]="activeItem === 'dashboard'">
    <i class="bi bi-grid-1x2"></i>
    Dashboard
  </a>
  <div class="seller-nav-label">Catalog</div>
  <a class="seller-nav-link" routerLink="/seller">
    <i class="bi bi-box-seam"></i>
    Products
    <span class="seller-nav-badge">{{ productCount }}</span>
  </a>
  <a
    class="seller-nav-link"
    routerLink="/seller/products/new"
    [class.active]="activeItem === 'create-product'"
  >
    <i class="bi bi-plus-square"></i>
    Create product
  </a>
  <a class="seller-nav-link" routerLink="/seller/media" [class.active]="activeItem === 'media'">
    <i class="bi bi-images"></i>
    Media library
  </a>

  <div class="seller-nav-label">Account</div>
  <a class="seller-nav-link" routerLink="/seller/profile" [class.active]="activeItem === 'profile'">
    <i class="bi bi-person-circle"></i>
    Profile
  </a>
