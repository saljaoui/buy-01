server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: media-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/buy01_media}

jwt:
  secret: ${JWT_SECRET:4fd8a6c3b92f4a8c9c6b8a1f2e3d4c5f6a7b8c9d}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
